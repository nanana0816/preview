<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>工場マップ可視化テンプレートアプリ</title>
    <style>
        /* 先進的なダーク・デジタルダッシュボード風のスタイル */
        :root {
            --bg-color: #121824;
            --road-color: #2a354a;
            --green-color: #1b3a24;
            --building-bg: rgba(30, 41, 59, 0.8);
            --building-border: #38bdf8;
            --line-bg: rgba(56, 189, 248, 0.15);
            --line-border: rgba(56, 189, 248, 0.6);
            --text-color: #f8fafc;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Helvetica Neue', Arial, sans-serif;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
        }

        /* モニターサイズ（21-24インチ、50-60インチ）に柔軟にフィットするコンテナ */
        #app-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        svg {
            width: 100%;
            height: 100%;
            max-width: 100vw;
            max-height: 100vh;
            background-color: var(--bg-color);
            user-select: none;
        }

        /* 各種グラフィック要素のスタイル */
        .road { fill: var(--road-color); }
        .green-zone { fill: var(--green-color); }
        
        .building {
            fill: var(--building-bg);
            stroke: var(--building-border);
            stroke-width: 2;
            transition: fill 0.3s, stroke-width 0.3s;
            cursor: pointer;
        }
        .building:hover {
            fill: rgba(56, 189, 248, 0.3);
            stroke-width: 3;
        }

        /* 工場内部のライン図形（移動対象になる想定のオブジェクト） */
        .factory-line {
            fill: var(--line-bg);
            stroke: var(--line-border);
            stroke-width: 1.5;
            cursor: move; /* 移動可能であることを示すインジケータ */
            transition: fill 0.2s;
        }
        .factory-line:hover {
            fill: rgba(56, 189, 248, 0.4);
        }

        .label-bg {
            fill: rgba(15, 23, 42, 0.85);
            stroke: rgba(255, 255, 255, 0.2);
            stroke-width: 1;
        }

        text {
            font-size: 14px;
            fill: var(--text-color);
            text-anchor: middle;
            dominant-baseline: central;
            pointer-events: none; /* テキストがドラッグやクリックの邪魔をしないようにする */
        }

        /* 稼働状況プロット用（ネオンエフェクト付きドット） */
        .status-dot {
            animation: pulse 2s infinite;
            pointer-events: none;
        }
        @keyframes pulse {
            0% { r: 6; opacity: 1; filter: drop-shadow(0 0 2px #ef4444); }
            50% { r: 10; opacity: 0.6; filter: drop-shadow(0 0 8px #ef4444); }
            100% { r: 6; opacity: 1; filter: drop-shadow(0 0 2px #ef4444); }
        }

        /* 左上のコントロールUI */
        #ui-panel {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(15, 23, 42, 0.85);
            padding: 15px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(4px);
            z-index: 10;
        }

        button {
            background: #0284c7;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 10px;
        }
        button:hover { background: #0369a1; }
    </style>
</head>
<body>

    <div id="ui-panel">
        <h3 style="margin: 0 0 5px 0;">工場マップ可視化システム</h3>
        <p style="margin: 0; font-size: 12px; color: #94a3b8;">モニター基準: 21-24" / 50-60" (1920x1080)</p>
        <button id="btn-reset">全体マップに戻る</button>
    </div>

    <div id="app-container">
        <svg id="factory-svg" viewBox="0 0 1920 1080" preserveAspectRatio="xMidYMid meet">
            
            <rect width="1920" height="1080" fill="#121824"/>
            
            <g id="environment-layer">
                <polygon points="50,400 300,950 600,950 400,400" class="green-zone" />
                <rect x="0" y="360" width="1920" height="40" class="road" />
                <rect x="800" y="400" width="60" height="680" class="road" />
            </g>

            <g id="viewport-group">
                
                <g idroom="building-head-chuzo">
                    <polygon points="620,420 800,420 800,650 620,650" class="building" data-name="ヘッド鋳造工場" data-zoom="710,535,2.5"/>
                    <text x="710" y="535">ヘッド鋳造工場 (詳細未定)</text>
                </g>

                <g idroom="building-block-chuzo">
                    <polygon points="420,420 600,420 600,650 420,650" class="building" data-name="ブロック鋳造工場" data-zoom="510,535,2.5"/>
                    <text x="510" y="535">ブロック鋳造工場 (詳細未定)</text>
                </g>

                <g id="building-dai2-group">
                    <polygon points="600,50 1300,50 1300,320 600,320" class="building" data-name="第2工場" data-zoom="950,185,1.8"/>
                    <g class="internal-details" style="display: none;">
                        <rect x="630" y="80" width="120" height="100" class="factory-line" id="line-small-gear" />
                        <text x="690" y="130" font-size="10">小型差動ギヤ</text>
                        
                        <rect x="770" y="80" width="180" height="60" class="factory-line" id="line-fms-crank" />
                        <text x="860" y="110" font-size="10">第1FMSクランク</text>

                        <polygon points="980,80 1100,80 1100,200 1040,200 1040,140 980,140" class="factory-line" id="line-l-shape" />
                        <text x="1040" y="110" font-size="10">L型変形ライン</text>
                    </g>
                    <text x="950" y="185" class="building-label">第2工場</text>
                </g>

                <g id="building-dai4-group">
                    <polygon points="420,680 650,680 550,850 420,850" class="building" data-name="第4工場" data-zoom="510,765,2.5"/>
                    <g class="internal-details" style="display: none;">
                        <polygon points="440,700 550,700 500,780 440,780" class="factory-line" id="line-dai4-triangle" />
                        <text x="480" y="740" font-size="10">三角形工程</text>
                    </g>
                    <text x="510" y="765" class="building-label">第4工場</text>
                </g>

                <g id="building-dai1-group">
                    <rect x="880" y="420" width="300" height="300" class="building" data-name="第1工場" data-zoom="1030,570,2"/>
                    <text x="1030" y="570" class="building-label">第1工場</text>
                </g>

                <g id="building-dai3-group">
                    <rect x="880" y="750" width="300" height="250" class="building" data-name="第3工場" data-zoom="1030,875,2.2"/>
                    <text x="1030" y="875" class="building-label">第3工場</text>
                </g>

                <g id="building-dai7-group">
                    <rect x="1220" y="420" width="350" height="220" class="building" data-name="第7工場" data-zoom="1395,530,2.2"/>
                    <text x="1395" y="530" class="building-label">第7工場</text>
                </g>

                <g id="building-dai6-group">
                    <rect x="1220" y="680" width="350" height="320" class="building" data-name="第6工場" data-zoom="1395,840,1.8"/>
                    <text x="1395" y="840" class="building-label">第6工場</text>
                </g>

                <g id="overlay-status-layer">
                    <circle cx="690" cy="130" r="8" fill="#ef4444" class="status-dot" id="dot-alert-1"/>
                </g>

            </g>
        </svg>
    </div>

    <script>
        const svg = document.getElementById('factory-svg');
        const viewportGroup = document.getElementById('viewport-group');
        const buildings = document.querySelectorAll('.building');
        const btnReset = document.getElementById('btn-reset');

        // アプリケーションの初期表示状態（ズームなし）
        let currentTarget = { x: 960, y: 540, scale: 1 };

        // 1. スムーズなズームイン・ズームアウト制御アニメーション
        function animateTransform(targetX, targetY, targetScale) {
            // 1920x1080の中心(960, 540)を基準に拡大縮小の移動量を計算
            const transX = 960 - targetX * targetScale;
            const transY = 540 - targetY * targetScale;

            // SVGのtransform属性を使い、ハードウェア加速を利かせて滑らかにズーム
            viewportGroup.style.transition = "transform 0.6s cubic-bezier(0.25, 1, 0.5, 1)";
            viewportGroup.style.transform = `translate(${transX}px, ${transY}px) scale(${targetScale})`;
        }

        // 各工場をタップ（クリック）した際のイベント設定
        buildings.forEach(building => {
            building.addEventListener('click', (e) => {
                const zoomData = building.getAttribute('data-zoom').split(',');
                const x = parseFloat(zoomData[0]);
                const y = parseFloat(zoomData[1]);
                const scale = parseFloat(zoomData[2]);

                // ズームイン実行
                animateTransform(x, y, scale);

                // タップされた工場内の詳細要素（ライン配置）をフェードイン表示
                document.querySelectorAll('.internal-details').forEach(el => el.style.display = 'none');
                document.querySelectorAll('.building-label').forEach(el => el.style.display = 'block');
                
                const parentGroup = building.parentElement;
                const details = parentGroup.querySelector('.internal-details');
                const label = parentGroup.querySelector('.building-label');
                if (details) details.style.display = 'block';
                if (label) label.style.display = 'none'; // 拡大時は建屋名を隠して詳細をスッキリ見せる

                e.stopPropagation();
            });
        });

        // 全体リセット（元の全体俯瞰マップに戻る）
        btnReset.addEventListener('click', () => {
            animateTransform(960, 540, 1);
            // 詳細を非表示にし、工場ラベルを戻す
            document.querySelectorAll('.internal-details').forEach(el => el.style.display = 'none');
            document.querySelectorAll('.building-label').forEach(el => el.style.display = 'block');
        });


        // 2. 将来機能：オブジェクト（三角形、L型、長方形）のドラッグ＆ドロップによる位置移動の土台ロジック
        let selectedElement = null;
        let offset = { x: 0, y: 0 };

        svg.addEventListener('mousedown', (e) => {
            // 移動対象のクラス「factory-line」を持つ要素がクリックされたか判定
            if (e.target.classList.contains('factory-line')) {
                selectedElement = e.target;
                
                // マウス位置とオブジェクトの基準位置とのオフセットを計算
                const p = getSVGPoint(e);
                
                if (selectedElement.tagName === 'rect') {
                    offset.x = p.x - parseFloat(selectedElement.getAttribute('x'));
                    offset.y = p.y - parseFloat(selectedElement.getAttribute('y'));
                } else if (selectedElement.tagName === 'polygon') {
                    // polygon（斜め線・L字・三角形）の場合はpoints配列をパースしてドラッグ開始時のポイント情報を取得可能
                    selectedElement.dataset.startPoints = selectedElement.getAttribute('points');
                    selectedElement.dataset.startX = p.x;
                    selectedElement.dataset.startY = p.y;
                }
            }
        });

        svg.addEventListener('mousemove', (e) => {
            if (selectedElement) {
                const p = getSVGPoint(e);
                
                if (selectedElement.tagName === 'rect') {
                    // 長方形・正方形の座標を動的に更新
                    selectedElement.setAttribute('x', p.x - offset.x);
                    selectedElement.setAttribute('y', p.y - offset.y);
                } else if (selectedElement.tagName === 'polygon') {
                    // 三角形・L型（多角形）の全座標点を移動量に応じて一括シフト
                    const dx = p.x - parseFloat(selectedElement.dataset.startX);
                    const dy = p.y - parseFloat(selectedElement.dataset.startY);
                    const originalPoints = selectedElement.dataset.startPoints.split(' ');
                    
                    const newPoints = originalPoints.map(pt => {
                        const coords = pt.split(',');
                        if(coords.length === 2) {
                            return `${parseFloat(coords[0]) + dx},${parseFloat(coords[1]) + dy}`;
                        }
                        return pt;
                    }).join(' ');
                    
                    selectedElement.setAttribute('points', newPoints);
                }
            }
        });

        svg.addEventListener('mouseup', () => {
            if (selectedElement) {
                // ここで移動完了時の新規座標をコンソールに表示（将来的なデータ保存用）
                console.log(`オブジェクト移動完了 ID: ${selectedElement.id}`);
                selectedElement = null;
            }
        });

        // マウス座標をSVG内の仮想解像度（1920x1080）の正確な座標に変換するヘルパー関数
        function getSVGPoint(e) {
            const point = svg.createSVGPoint();
            point.x = e.clientX;
            point.y = e.clientY;
            return point.matrixTransform(svg.getScreenCTM().inverse());
        }
    </script>
</body>
</html>
