<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>工場マップ詳細可視化＆エディタシステム</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --road-color: #334155;
            --green-color: #14532d;
            --building-bg: rgba(30, 41, 59, 0.75);
            --building-border: #38bdf8;
            --line-bg: rgba(56, 189, 248, 0.2);
            --line-border: #0ea5e9;
            --text-color: #f8fafc;
        }

        body {
            margin: 0; padding: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Helvetica Neue', Arial, sans-serif;
            overflow: hidden;
            width: 100vw; height: 100vh;
            display: flex;
        }

        /* 左側：高機能コントロールパネル */
        #control-panel {
            width: 320px;
            background: rgba(15, 23, 42, 0.95);
            border-right: 1px solid rgba(255, 255, 255, 0.1);
            padding: 20px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            gap: 15px;
            z-index: 10;
            overflow-y: auto;
        }

        /* 右側：マップ表示エリア */
        #map-container {
            flex: 1;
            position: relative;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        svg {
            width: 100%; height: 100%;
            max-width: 100vw; max-height: 100vh;
            background-color: var(--bg-color);
            user-select: none;
        }

        /* 各種グラフィック要素のスタイル */
        .road { fill: var(--road-color); }
        .green-zone { fill: var(--green-color); }
        
        /* リアル化した工場外枠（斜め対応） */
        .building {
            fill: var(--building-bg);
            stroke: var(--building-border);
            stroke-width: 2;
            cursor: pointer;
            transition: fill 0.3s;
        }
        .building:hover {
            fill: rgba(56, 189, 248, 0.15);
        }

        /* ユーザーが操作・追加できるラインオブジェクト */
        .factory-line {
            fill: var(--line-bg);
            stroke: var(--line-border);
            stroke-width: 2;
            cursor: move;
        }
        .factory-line:hover {
            stroke: #f43f5e; /* ホバー時は赤系の枠線に */
        }
        .factory-line.selected {
            stroke: #f43f5e;
            fill: rgba(244, 63, 94, 0.3);
            stroke-dasharray: 4;
        }

        /* 稼働ステータスカラー */
        .status-running { fill: rgba(34, 197, 94, 0.3); stroke: #22c55e; }
        .status-stopped { fill: rgba(239, 68, 68, 0.3); stroke: #ef4444; }
        .status-maintenance { fill: rgba(234, 179, 8, 0.3); stroke: #eab308; }

        text {
            font-size: 13px;
            fill: var(--text-color);
            text-anchor: middle;
            dominant-baseline: central;
            pointer-events: none;
        }

        /* UIパーツの共通スタイル */
        h3, h4 { margin: 0; color: #38bdf8; }
        button {
            background: #0284c7; color: white; border: none;
            padding: 8px 12px; border-radius: 4px; cursor: pointer;
            font-weight: bold; transition: background 0.2s;
        }
        button:hover { background: #0369a1; }
        button.btn-danger { background: #b91c1c; }
        button.btn-danger:hover { background: #991b1b; }
        
        .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        label { font-size: 12px; color: #94a3b8; }
        input, select, textarea {
            width: 100%; background: #1e293b; border: 1px solid #475569;
            color: white; padding: 6px; border-radius: 4px; box-sizing: border-box;
        }

        /* ライン停止時などの脈動ドットエフェクト */
        .status-dot {
            animation: pulse 2s infinite;
            pointer-events: none;
        }
        @keyframes pulse {
            0% { r: 6; opacity: 1; filter: drop-shadow(0 0 2px #ef4444); }
            50% { r: 10; opacity: 0.5; filter: drop-shadow(0 0 8px #ef4444); }
            100% { r: 6; opacity: 1; filter: drop-shadow(0 0 2px #ef4444); }
        }
    </style>
</head>
<body>

    <div id="control-panel">
        <div>
            <h3>工場マップ可視化システム</h3>
            <p style="margin:4px 0 0 0; font-size:11px; color:#64748b;">基準解像度: 1920x1080フィット型</p>
        </div>
        
        <button id="btn-reset" style="background:#475569;">← 全体マップ（俯瞰）へ戻る</button>
        
        <hr style="border:0; border-top:1px solid #334155; margin:5px 0;">

        <div>
            <h4>オブジェクト新規配置</h4>
            <p style="margin:2px 0 8px 0; font-size:11px; color:#94a3b8;">※拡大（ズームイン）した状態で追加してください</p>
            <div class="btn-group">
                <button onclick="addNewObject('rect')">■ 長方形</button>
                <button onclick="addNewObject('square')">■ 正方形</button>
                <button onclick="addNewObject('triangle')">▲ 三角形</button>
                <button onclick="addNewObject('l-shape')">┗ L型ライン</button>
            </div>
        </div>

        <div id="editor-form" style="display: none; background:#1e293b; padding:12px; border-radius:6px; border:1px solid #334155;">
            <h4>オブジェクト属性編集</h4>
            <div style="margin-top:10px; display:flex; flex-direction:column; gap:10px;">
                <div>
                    <label>ライン・工程名</label>
                    <input type="text" id="edit-name" oninput="updateSelectedAttributes()">
                </div>
                <div>
                    <label>稼働状況ステータス</label>
                    <select id="edit-status" onchange="updateSelectedAttributes()">
                        <option value="default">指定なし（標準ブルー）</option>
                        <option value="status-running">通常稼働（緑）</option>
                        <option value="status-stopped">ライン停止・異常（赤）</option>
                        <option value="status-maintenance">保全・調整中（黄）</option>
                    </select>
                </div>
                <div>
                    <label>デジタル改善事例 / メモ</label>
                    <textarea id="edit-memo" rows="3" oninput="updateSelectedAttributes()"></textarea>
                </div>
                <button class="btn-danger" onclick="deleteSelectedObject()">選択オブジェクトを削除</button>
            </div>
        </div>

        <hr style="border:0; border-top:1px solid #334155; margin:5px 0;">

        <div>
            <h4>マップデータの管理</h4>
            <p style="margin:2px 0 8px 0; font-size:11px; color:#94a3b8;">配置・編集した状態を保存・復元できます</p>
            <div class="btn-group">
                <button onclick="saveMapData()" style="background:#16a34a;">データを保存</button>
                <button onclick="loadMapData()" style="background:#2563eb;">データを読込</button>
            </div>
        </div>
    </div>

    <div id="map-container">
        <svg id="factory-svg" viewBox="0 0 1920 1080" preserveAspectRatio="xMidYMid meet">
            
            <rect width="1920" height="1080" fill="#0f172a"/>
            
            <g id="environment-layer">
                <polygon points="50,400 350,1050 780,1050 780,400" class="green-zone" />
                <rect x="0" y="350" width="1920" height="45" class="road" />
                <polygon points="780,395 780,1080 840,1080 840,395" class="road" />
            </g>

            <g id="viewport-group">
                
                <g id="building-dai2">
                    <polygon points="550,40 1450,40 1450,310 550,310" class="building" data-zoom="1000,175,1.7"/>
                    <text x="1000" y="175" class="building-label">第2工場</text>
                </g>

                <g id="building-head-chuzo">
                    <polygon points="560,400 760,400 760,560 560,560" class="building" data-zoom="660,480,2.5"/>
                    <text x="660" y="480" class="building-label">ヘッド鋳造工場</text>
                </g>
                <g id="building-block-chuzo">
                    <polygon points="520,590 760,590 760,760 520,760" class="building" data-zoom="640,675,2.5"/>
                    <text x="640" y="675" class="building-label">ブロック鋳造工場</text>
                </g>
                <g id="building-dai4">
                    <polygon points="460,790 760,790 760,1020 380,1020" class="building" data-zoom="590,905,2.2"/>
                    <text x="590" y="905" class="building-label">第4工場</text>
                </g>

                <g id="building-dai1-dai3">
                    <polygon points="860,400 1180,400 1180,750 860,750" class="building" data-zoom="1020,575,1.8"/>
                    <polygon points="860,750 1180,750 1180,1020 920,1020 920,850 860,850" class="building" data-zoom="1020,885,2.0"/>
                    <text x="1020,575" class="building-label" id="label-d1">第1工場</text>
                    <text x="1050,885" class="building-label" id="label-d3">第3工場</text>
                </g>

                <g id="building-dai7-dai6">
                    <polygon points="1210,400 1600,400 1600,640 1210,640" class="building" data-zoom="1405,520,2.0"/>
                    <polygon points="1210,670 1600,670 1600,1020 1210,1020" class="building" data-zoom="1405,845,1.8"/>
                    <text x="1405" y="520" class="building-label" id="label-d7">第7工場</text>
                    <text x="1405" y="845" class="building-label" id="label-d6">第6工場</text>
                </g>


                <g id="dynamic-lines-layer">
                    <g class="user-object" data-id="obj_init_1" data-type="rect" data-name="小型差動ギヤ" data-status="status-running" data-memo="デジタル改善：RFID管理導入済み">
                        <rect x="600" y="80" width="160" height="80" class="factory-line status-running" />
                        <text x="680" y="120">小型差動ギヤ</text>
                    </g>
                    <g class="user-object" data-id="obj_init_2" data-type="l-shape" data-name="Jクランク変形ライン" data-status="status-stopped" data-memo="現在刃研磨ラインとの連携調整中">
                        <polygon points="900,450 1050,450 1050,550 980,550 980,500 900,500" class="factory-line status-stopped" />
                        <text x="975" y="475">Jクランク変形ライン</text>
                    </g>
                </g>

                <g id="alert-dots-layer">
                    <circle cx="975" cy="475" r="8" fill="#ef4444" class="status-dot" id="dot-alert-sample"/>
                </g>

            </g>
        </svg>
    </div>

    <script>
        const svg = document.getElementById('factory-svg');
        const viewportGroup = document.getElementById('viewport-group');
        const buildings = document.querySelectorAll('.building');
        const btnReset = document.getElementById('btn-reset');
        const dynamicLinesLayer = document.getElementById('dynamic-lines-layer');
        const alertDotsLayer = document.getElementById('alert-dots-layer');
        
        // フォーム用パーツ
        const editorForm = document.getElementById('editor-form');
        const editName = document.getElementById('edit-name');
        const editStatus = document.getElementById('edit-status');
        const editMemo = document.getElementById('edit-memo');

        let currentScale = 1;
        let selectedObjectGroup = null;

        // --- 1. ズームイン・ズームアウトアニメーション機能 ---
        function animateTransform(targetX, targetY, targetScale) {
            currentScale = targetScale;
            const transX = 960 - targetX * targetScale;
            const transY = 540 - targetY * targetScale;

            viewportGroup.style.transition = "transform 0.6s cubic-bezier(0.25, 1, 0.5, 1)";
            viewportGroup.style.transform = `translate(${transX}px, ${transY}px) scale(${targetScale})`;
        }

        // 各工場区画クリックで対応座標へズームイン
        buildings.forEach(building => {
            building.addEventListener('click', (e) => {
                if (e.target !== building) return; // 内部のオブジェクトクリック時はズームさせない
                const zoomData = building.getAttribute('data-zoom').split(',');
                animateTransform(parseFloat(zoomData[0]), parseFloat(zoomData[1]), parseFloat(zoomData[2]));
                e.stopPropagation();
            });
        });

        // 俯瞰（リセット）
        btnReset.addEventListener('click', () => {
            animateTransform(960, 540, 1);
            clearSelection();
        });

        // --- 2. 新規オブジェクト（三角形、L型、長方形、正方形）の追加機能 ---
        function addNewObject(shapeType) {
            if (currentScale === 1) {
                alert("オブジェクトを追加するには、まず追加したい先の工場マップをタップして拡大（ズームイン）してください。");
                return;
            }

            const id = "obj_" + Date.now();
            const g = document.createElementNS("http://www.w3.org/2000/svg", "g");
            g.setAttribute("class", "user-object");
            g.setAttribute("data-id", id);
            g.setAttribute("data-type", shapeType);
            g.setAttribute("data-name", "新規ライン工程");
            g.setAttribute("data-status", "default");
            g.setAttribute("data-memo", "");

            // ズームインしている画面中央付近の座標を逆算して初期配置
            const matrix = viewportGroup.style.transform.match(/translate\(([^px]+)px,\s*([^px]+)px\)/);
            let cx = 960, cy = 540;
            if (matrix) {
                cx = (960 - parseFloat(matrix[1])) / currentScale;
                cy = (540 - parseFloat(matrix[2])) / currentScale;
            }

            let shapeEl;
            let textX = cx, textY = cy;

            if (shapeType === 'rect') {
                shapeEl = document.createElementNS("http://www.w3.org/2000/svg", "rect");
                shapeEl.setAttribute("x", cx - 80); shapeEl.setAttribute("y", cy - 40);
                shapeEl.setAttribute("width", 160); shapeEl.setAttribute("height", 80);
            } else if (shapeType === 'square') {
                shapeEl = document.createElementNS("http://www.w3.org/2000/svg", "rect");
                shapeEl.setAttribute("x", cx - 50); shapeEl.setAttribute("y", cy - 50);
                shapeEl.setAttribute("width", 100); shapeEl.setAttribute("height", 100);
            } else if (shapeType === 'triangle') {
                shapeEl = document.createElementNS("http://www.w3.org/2000/svg", "polygon");
                shapeEl.setAttribute("points", `${cx},${cy - 50} ${cx + 60},${cy + 50} ${cx - 60},${cy + 50}`);
            } else if (shapeType === 'l-shape') {
                shapeEl = document.createElementNS("http://www.w3.org/2000/svg", "polygon");
                shapeEl.setAttribute("points", `${cx - 50},${cy - 50} ${cx + 50},${cy - 50} ${cx + 50},${cy + 50} ${cx},${cy + 50} ${cx},${cy} ${cx - 50},${cy}`);
                textX = cx + 15; textY = cy - 15;
            }

            shapeEl.setAttribute("class", "factory-line");
            g.appendChild(shapeEl);

            const textEl = document.createElementNS("http://www.w3.org/2000/svg", "text");
            textEl.setAttribute("x", textX);
            textEl.setAttribute("y", textY);
            textEl.textContent = "新規ライン工程";
            g.appendChild(textEl);

            dynamicLinesLayer.appendChild(g);
            setupObjectEvents(g);
            selectObject(g);
        }

        // --- 3. オブジェクト選択＆フォーム編集ロジック ---
        function setupObjectEvents(g) {
            const shape = g.querySelector('.factory-line');
            shape.addEventListener('click', (e) => {
                selectObject(g);
                e.stopPropagation();
            });
        }

        // 最初からあるサンプル用にもイベントを適用
        document.querySelectorAll('.user-object').forEach(g => setupObjectEvents(g));

        function selectObject(g) {
            clearSelection();
            selectedObjectGroup = g;
            g.querySelector('.factory-line').classList.add('selected');
            
            // フォームに現在の値をセット
            editName.value = g.getAttribute('data-name') || "";
            editStatus.value = g.getAttribute('data-status') || "default";
            editMemo.value = g.getAttribute('data-memo') || "";
            editorForm.style.display = 'block';
        }

        function clearSelection() {
            document.querySelectorAll('.factory-line').forEach(el => el.classList.remove('selected'));
            selectedObjectGroup = null;
            editorForm.style.display = 'none';
        }

        // 入力フォームの内容をリアルタイムにSVG内部属性＆テキストへ反映
        function updateSelectedAttributes() {
            if (!selectedObjectGroup) return;
            
            const name = editName.value;
            const status = editStatus.value;
            const memo = editMemo.value;

            selectedObjectGroup.setAttribute('data-name', name);
            selectedObjectGroup.setAttribute('data-status', status);
            selectedObjectGroup.setAttribute('data-memo', memo);

            // テキスト要素の書き換え
            selectedObjectGroup.querySelector('text').textContent = name;

            // クラス（色替え）の適用
            const shape = selectedObjectGroup.querySelector('.factory-line');
            shape.className.baseVal = "factory-line " + (status !== 'default' ? status : '');
            if (shape.classList.contains('selected') === false) shape.classList.add('selected');

            updateAlertDots(); // ステータス変更に伴いアラートドットの位置を再計算
        }

        function deleteSelectedObject() {
            if (selectedObjectGroup && confirm("このオブジェクトを削除してよろしいですか？")) {
                selectedObjectGroup.remove();
                clearSelection();
                updateAlertDots();
            }
        }

        // 停止（赤色）ステータスのラインの上にネオン点滅ドットを表示させる自動マッピング
        function updateAlertDots() {
            alertDotsLayer.innerHTML = ""; // 一旦クリア
            document.querySelectorAll('.user-object').forEach(g => {
                if (g.getAttribute('data-status') === 'status-stopped') {
                    const textEl = g.querySelector('text');
                    const cx = textEl.getAttribute('x');
                    const cy = textEl.getAttribute('y');
                    
                    const dot = document.createElementNS("http://www.w3.org/2000/svg", "circle");
                    dot.setAttribute("cx", cx);
                    dot.setAttribute("cy", cy);
                    dot.setAttribute("r", "8");
                    dot.setAttribute("fill", "#ef4444");
                    dot.setAttribute("class", "status-dot");
                    alertDotsLayer.appendChild(dot);
                }
            });
        }
        svg.addEventListener('click', () => clearSelection());

        // --- 4. 移動（ドラッグ＆ドロップ）の実装 ---
        let dragElement = null;
        let dragGroup = null;
        let offset = { x: 0, y: 0 };

        svg.addEventListener('mousedown', (e) => {
            if (e.target.classList.contains('factory-line')) {
                dragElement = e.target;
                dragGroup = dragElement.parentElement;
                const p = getSVGPoint(e);
                
                if (dragElement.tagName === 'rect') {
                    offset.x = p.x - parseFloat(dragElement.getAttribute('x'));
                    offset.y = p.y - parseFloat(dragElement.getAttribute('y'));
                } else if (dragElement.tagName === 'polygon') {
                    dragElement.dataset.startPoints = dragElement.getAttribute('points');
                    dragElement.dataset.startX = p.x;
                    dragElement.dataset.startY = p.y;
                }
            }
        });

        svg.addEventListener('mousemove', (e) => {
            if (dragElement && dragGroup) {
                const p = getSVGPoint(e);
                const textEl = dragGroup.querySelector('text');
                
                if (dragElement.tagName === 'rect') {
                    const newX = p.x - offset.x;
                    const newY = p.y - offset.y;
                    dragElement.setAttribute('x', newX);
                    dragElement.setAttribute('y', newY);
                    
                    // テキスト位置も長方形の中央へ追従
                    const w = parseFloat(dragElement.getAttribute('width'));
                    const h = parseFloat(dragElement.getAttribute('height'));
                    textEl.setAttribute('x', newX + w / 2);
                    textEl.setAttribute('y', newY + h / 2);
                    
                } else if (dragElement.tagName === 'polygon') {
                    const dx = p.x - parseFloat(dragElement.dataset.startX);
                    const dy = p.y - parseFloat(dragElement.dataset.startY);
                    const originalPoints = dragElement.dataset.startPoints.split(' ');
                    
                    let sumX = 0, sumY = 0, count = 0;
                    const newPoints = originalPoints.map(pt => {
                        const coords = pt.split(',');
                        if(coords.length === 2) {
                            const nx = parseFloat(coords[0]) + dx;
                            const ny = parseFloat(coords[1]) + dy;
                            sumX += nx; sumY += ny; count++;
                            return `${nx},${ny}`;
                        }
                        return pt;
                    }).join(' ');
                    
                    dragElement.setAttribute('points', newPoints);
                    
                    // 多角形（L型・三角形）の各頂点の平均値にテキスト位置を自動追従
                    if (count > 0) {
                        // L型の場合は重心が少しずれるため微調整を入れるとより綺麗になります
                        textEl.setAttribute('x', sumX / count + (dragGroup.getAttribute('data-type')==='l-shape'? 15 : 0));
                        textEl.setAttribute('y', sumY / count - (dragGroup.getAttribute('data-type')==='l-shape'? 15 : 0));
                    }
                }
                updateAlertDots();
            }
        });

        svg.addEventListener('mouseup', () => {
            dragElement = null;
            dragGroup = null;
        });

        function getSVGPoint(e) {
            const point = svg.createSVGPoint();
            point.x = e.clientX; point.y = e.clientY;
            return point.matrixTransform(svg.getScreenCTM().inverse());
        }

        // --- 5. マップデータの保存（JSON出力）と読み込み機能 ---
        function saveMapData() {
            const objectsData = [];
            document.querySelectorAll('.user-object').forEach(g => {
                const shape = g.querySelector('.factory-line');
                const text = g.querySelector('text');
                
                const obj = {
                    id: g.getAttribute('data-id'),
                    type: g.getAttribute('data-type'),
                    name: g.getAttribute('data-name'),
                    status: g.getAttribute('data-status'),
                    memo: g.getAttribute('data-memo'),
                    textX: text.getAttribute('x'),
                    textY: text.getAttribute('y')
                };

                if (shape.tagName === 'rect') {
                    obj.x = shape.getAttribute('x');
                    obj.y = shape.getAttribute('y');
                    obj.width = shape.getAttribute('width');
                    obj.height = shape.getAttribute('height');
                } else if (shape.tagName === 'polygon') {
                    obj.points = shape.getAttribute('points');
                }
                objectsData.push(obj);
            });

            const jsonStr = JSON.stringify(objectsData, null, 2);
            localStorage.setItem('factory_map_user_data', jsonStr);
            alert("ブラウザの内部ストレージ(LocalStorage)に現在の配置データ（" + objectsData.length + "件）を一時保存しました。\n\n【バックアップ用JSONデータ】:\n" + jsonStr);
            console.log("Saved Data:", jsonStr);
        }

        function loadMapData() {
            const jsonStr = localStorage.getItem('factory_map_user_data');
            if (!jsonStr) {
                alert("保存されたデータが見つかりません。まずは「データを保存」を押してください。");
                return;
            }

            const objectsData = JSON.parse(jsonStr);
            dynamicLinesLayer.innerHTML = ""; // 現在の動的オブジェクトを全クリア

            objectsData.forEach(obj => {
                const g = document.createElementNS("http://www.w3.org/2000/svg", "g");
                g.setAttribute("class", "user-object");
                g.setAttribute("data-id", obj.id);
                g.setAttribute("data-type", obj.type);
                g.setAttribute("data-name", obj.name);
                g.setAttribute("data-status", obj.status);
                g.setAttribute("data-memo", obj.memo);

                let shapeEl;
                if (obj.type === 'rect' || obj.type === 'square') {
                    shapeEl = document.createElementNS("http://www.w3.org/2000/svg", "rect");
                    shapeEl.setAttribute("x", obj.x);
                    shapeEl.setAttribute("y", obj.y);
                    shapeEl.setAttribute("width", obj.width);
                    shapeEl.setAttribute("height", obj.height);
                } else {
                    shapeEl = document.createElementNS("http://www.w3.org/2000/svg", "polygon");
                    shapeEl.setAttribute("points", obj.points);
                }

                shapeEl.setAttribute("class", "factory-line " + (obj.status !== 'default' ? obj.status : ''));
                g.appendChild(shapeEl);

                const textEl = document.createElementNS("http://www.w3.org/2000/svg", "text");
                textEl.setAttribute("x", obj.textX);
                textEl.setAttribute("y", obj.textY);
                textEl.textContent = obj.name;
                g.appendChild(textEl);

                dynamicLinesLayer.appendChild(g);
                setupObjectEvents(g);
            });

            clearSelection();
            updateAlertDots();
            alert("前回保存された配置データ（" + objectsData.length + "件）を正常に読み込み・展開しました。");
        }

        // 初期ロード時にアラートドットの配置を計算
        updateAlertDots();
    </script>
</body>
</html>
