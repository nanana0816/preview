<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>次世代生産管理・物流可視化プロトタイプ</title>
    <style>
        :root {
            --bg-color: #f4f6f9;
            --panel-bg: #ffffff;
            --text-color: #333333;
            --border-color: #e0e0e0;
            --primary-color: #005bac;
            --danger-color: #d9534f;
            --success-color: #5cb85c;
        }

        body {
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', メイリオ, sans-serif;
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        /* ヘッダー */
        header {
            background-color: var(--primary-color);
            color: white;
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        header h1 {
            margin: 0;
            font-size: 1.2rem;
        }

        /* パンくずリスト風の階層ナビゲーション */
        .breadcrumb-container {
            background-color: var(--panel-bg);
            padding: 10px 20px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            gap: 10px;
            align-items: center;
            font-size: 0.9rem;
        }

        .layer-btn {
            background: none;
            border: 1px solid var(--border-color);
            padding: 5px 10px;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .layer-btn:hover {
            background-color: #e9ecef;
        }

        .layer-btn.active {
            background-color: var(--primary-color);
            color: white;
            border-color: var(--primary-color);
        }

        /* メインコンテンツエリア */
        .main-container {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        /* マップ描画エリア */
        .map-area {
            flex: 1;
            position: relative;
            background-color: #fafafa;
            overflow: auto;
            padding: 40px;
        }

        /* ネットワークノード（工程・ライン） */
        .node {
            position: absolute;
            background-color: var(--panel-bg);
            border: 2px solid #adb5bd;
            border-radius: 8px;
            padding: 15px;
            width: 140px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            z-index: 2;
        }

        .node:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(0,0,0,0.1);
            border-color: var(--primary-color);
        }

        .node-title {
            font-weight: bold;
            font-size: 0.85rem;
            margin-bottom: 5px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 3px;
        }

        .node-value {
            font-size: 1.4rem;
            font-weight: bold;
            text-align: right;
            color: #495057;
        }

        .node-unit {
            font-size: 0.75rem;
            color: #6c757d;
            margin-left: 2px;
        }

        /* コネクションライン（簡易版をCSSとSVGで表現） */
        .svg-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        /* 詳細情報サイドパネル */
        .side-panel {
            width: 320px;
            background-color: var(--panel-bg);
            border-left: 1px solid var(--border-color);
            padding: 20px;
            box-shadow: -2px 0 5px rgba(0,0,0,0.02);
            overflow-y: auto;
        }

        .panel-title {
            font-size: 1.1rem;
            font-weight: bold;
            margin-top: 0;
            margin-bottom: 15px;
            color: var(--primary-color);
            border-bottom: 2px solid var(--primary-color);
            padding-bottom: 5px;
        }

        .data-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.85rem;
        }

        .data-table th, .data-table td {
            padding: 8px;
            text-align: left;
            border-bottom: 1px solid var(--border-color);
        }

        .data-table th {
            background-color: #f8f9fa;
            color: #495057;
            width: 40%;
        }

        .alert-badge {
            display: inline-block;
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: bold;
            color: white;
            background-color: var(--danger-color);
        }
    </style>
</head>
<body>

    <header>
        <h1>リアルタイム・バリューストリーム監視システム</h1>
        <div style="font-size: 0.85rem;">データ更新基準: 2026/05/27 2直現在</div>
    </header>

    <div class="breadcrumb-container">
        <span>表示粒度:</span>
        <button class="layer-btn" onclick="switchLayer('factory')">工場全体</button>
        <span>&gt;</span>
        <button class="layer-btn" onclick="switchLayer('bu_ka')">製造部 / 組立科</button>
        <span>&gt;</span>
        <button class="layer-btn active" onclick="switchLayer('line_koutei')">メインライン（工程レベル）</button>
    </div>

    <div class="main-container">
        <div class="map-area" id="mapArea">
            <svg class="svg-overlay" id="svgOverlay">
                <defs>
                    <marker id="arrow" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
                        <path d="M 0 0 L 10 5 L 0 10 z" fill="#adb5bd" />
                    </marker>
                    <marker id="arrow-danger" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
                        <path d="M 0 0 L 10 5 L 0 10 z" fill="#d9534f" />
                    </marker>
                </defs>
                
                </svg>

            </div>

        <div class="side-panel" id="sidePanel">
            <h2 class="panel-title" id="panelTitle">工程を選択してください</h2>
            <p style="font-size:0.85rem; color:#6c757d;">左側のマップ内のノードをクリックすると、4M情報や資産No.などの詳細が表示されます。</p>
            <div id="panelContent"></div>
        </div>
    </div>

    <script>
        // サンプルデータ（粒度：工程レベル）
        const mockNodes = [
            { id: 'K_01', name: '工程1: ボデー投入', val: 12, unit: '台', x: 50, y: 150, factory: 'A工場', bu: '製造部', ka: '組立科', line: 'メインライン', assetNo: 'EQ-BO-001', leader: '日野 太郎', status: '正常' },
            { id: 'K_02', name: '工程2: ドア組付', val: 42, unit: '台', x: 300, y: 150, factory: 'A工場', bu: '製造部', ka: '組立科', line: 'メインライン', assetNo: 'EQ-DR-042', leader: '日野 次郎', status: '仕掛滞留注意' },
            { id: 'K_03', name: '工程3: サブライン合流', val: 8, unit: '台', x: 300, y: 320, factory: 'A工場', bu: '製造部', ka: '組立科', line: 'サブライン', assetNo: 'EQ-SUB-102', leader: '山田 三郎', status: '正常' },
            { id: 'K_04', name: '工程4: 外観検査', val: 5, unit: '台', x: 600, y: 150, factory: 'A工場', bu: '製造部', ka: '組立科', line: 'メインライン', assetNo: 'EQ-IN-009', leader: '佐藤 四郎', status: '正常' }
        ];

        // 工程同士を繋ぐルート（線）と、その間の仕掛・物流数
        const mockEdges = [
            { from: 'K_01', to: 'K_02', inTransit: 28, alert: true },  // 仕掛が溜まりすぎているルート
            { from: 'K_02', to: 'K_04', inTransit: 8, alert: false },
            { from: 'K_03', to: 'K_02', inTransit: 4, alert: false }
        ];

        // 画面の初期描画
        function renderMap() {
            const mapArea = document.getElementById('mapArea');
            const svgOverlay = document.getElementById('svgOverlay');

            // 既存のノードをクリア（SVG以外の要素を削除）
            const nodes = mapArea.querySelectorAll('.node');
            nodes.forEach(n => n.remove());

            // 1. ノード（工程カード）の配置
            mockNodes.forEach(node => {
                const div = document.createElement('div');
                div.className = 'node';
                div.style.left = node.x + 'px';
                div.style.top = node.y + 'px';
                div.innerHTML = `
                    <div class="node-title">${node.name}</div>
                    <div class="node-value">${node.val}<span class="node-unit">${node.unit}</span></div>
                `;
                div.onclick = () => showDetails(node);
                mapArea.appendChild(div);
            });

            // 2. エッジ（矢印線）の描画
            let svgContent = svgOverlay.innerHTML; // defsを保持するため
            mockEdges.forEach(edge => {
                const fromNode = mockNodes.find(n => n.id === edge.from);
                const toNode = mockNodes.find(n => n.id === edge.to);

                if (fromNode && toNode) {
                    // カードの中心位置を計算（幅170px、高75pxの概算値に基づく）
                    const x1 = fromNode.x + 85;
                    const y1 = fromNode.y + 37;
                    const x2 = toNode.x + 5; // 少し手前で止める
                    const y2 = toNode.y + 37;

                    const strokeColor = edge.alert ? 'var(--danger-color)' : '#adb5bd';
                    const strokeWidth = edge.alert ? '4' : '2';
                    const marker = edge.alert ? 'url(#arrow-danger)' : 'url(#arrow)';

                    // 直線またはカギ線を引く（今回は簡易的な直線）
                    svgContent += `
                        <g>
                            <path d="M ${x1} ${y1} L ${x2} ${y2}" stroke="${strokeColor}" stroke-width="${strokeWidth}" fill="none" marker-end="${marker}" />
                            <text x="${(x1+x2)/2}" y="${((y1+y2)/2) - 10}" fill="${strokeColor}" font-size="12" font-weight="bold" text-anchor="middle">
                                移動中: ${edge.inTransit}台
                            </text>
                        </g>
                    `;
                }
            });
            svgOverlay.innerHTML = svgContent;
        }

        // 詳細情報の表示
        function showDetails(node) {
            document.getElementById('panelTitle').innerText = node.name;
            
            let statusBadge = node.status === '正常' 
                ? `<span class="alert-badge" style="background-color:var(--success-color)">${node.status}</span>`
                : `<span class="alert-badge">${node.status}</span>`;

            const html = `
                <table class="data-table">
                    <tr><th>ステータス</th><td>${statusBadge}</td></tr>
                    <tr><th>工場</th><td>${node.factory}</td></tr>
                    <tr><th>所属部</th><td>${node.bu}</td></tr>
                    <tr><th>所属科</th><td>${node.ka}</td></tr>
                    <tr><th>所属ライン</th><td>${node.line}</td></tr>
                    <tr><th>設備資産No.</th><td><strong>${node.assetNo}</strong></td></tr>
                    <tr><th>担当当番（Man）</th><td>${node.leader} 指導員</td></tr>
                    <tr><th>現在の工程内数</th><td>${node.val} ${node.unit}</td></tr>
                </table>
                <div style="margin-top: 15px; font-size:0.8rem; background:#f8f9fa; padding:10px; border-radius:4px; border-left:4px solid var(--primary-color);">
                    <strong>職長・工長へのヒント:</strong><br>
                    前工程からの移動数が基準値をオーバーしています。手前の工程でのタクト遅れ、または搬送用AGVのトラブル（変化点）がないか確認してください。
                </div>
            `;
            document.getElementById('panelContent').innerHTML = html;
        }

        // 階層切り替えのダミー関数（今回はメッセージのみ）
        function switchLayer(layerName) {
            alert(`粒度を変更しました: [${layerName}]\n\n実際のシステムでは、ここでマップの解像度が『工場単位』の大きな塊から、個々の『設備資産単位』の細かな繋がりへと動的に切り替わります。`);
        }

        // ページロード時にマップを展開
        window.onload = renderMap;
    </script>
</body>
</html>
