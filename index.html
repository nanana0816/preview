<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>社内AI用 プロンプト整形＆マスキングツール</title>
    <style>
        :root {
            --primary-color: #2c3e50;
            --accent-color: #3498db;
            --bg-color: #f5f7fa;
            --card-bg: #ffffff;
            --border-color: #dcdde1;
        }
        * { box-sizing: border-box; }
        body {
            font-family: "Segoe UI", Meiryo, sans-serif;
            line-height: 1.6;
            color: #333;
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            background-color: var(--bg-color);
        }
        h1 {
            color: var(--primary-color);
            border-bottom: 3px solid var(--accent-color);
            padding-bottom: 10px;
            font-size: 24px;
            margin-bottom: 20px;
        }
        h2 {
            font-size: 16px;
            color: var(--primary-color);
            margin-top: 0;
            margin-bottom: 12px;
            border-left: 4px solid var(--accent-color);
            padding-left: 8px;
        }
        .layout-grid {
            display: table;
            width: 100%;
            table-layout: fixed;
            border-collapse: separate;
            border-spacing: 20px 0;
        }
        .layout-col {
            display: table-cell;
            vertical-align: top;
        }
        .card {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            margin-bottom: 20px;
        }
        textarea {
            width: 100%;
            height: 140px;
            padding: 12px;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            font-family: inherit;
            font-size: 14px;
            resize: vertical;
        }
        .table-container {
            max-height: 300px;
            overflow-y: auto;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            margin-bottom: 10px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }
        th, td {
            padding: 8px 10px;
            border-bottom: 1px solid var(--border-color);
            text-align: left;
        }
        th {
            background-color: #f8f9fa;
            position: sticky;
            top: 0;
            color: var(--primary-color);
        }
        .input-inline {
            width: 100%;
            padding: 4px 6px;
            border: 1px solid var(--border-color);
            border-radius: 3px;
        }
        .btn {
            background-color: var(--accent-color);
            color: #fff;
            border: none;
            padding: 8px 16px;
            font-size: 14px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            margin-right: 5px;
            margin-bottom: 5px;
        }
        .btn:hover { background-color: #2980b9; }
        .btn-danger { background-color: #e74c3c; padding: 4px 8px; font-size: 12px; }
        .btn-danger:hover { background-color: #c0392b; }
        .btn-success { background-color: #2ecc71; }
        .btn-success:hover { background-color: #27ae60; }
        .btn-large {
            display: block;
            width: 100%;
            padding: 15px;
            font-size: 18px;
            margin: 20px 0;
        }
        .result-box {
            background-color: #eef2f7;
            border: 2px solid var(--accent-color);
            height: 220px;
        }
        .hint { font-size: 12px; color: #7f8c8d; margin-top: 5px; }
        .drop-zone {
            border: 2px dashed var(--accent-color);
            padding: 15px;
            text-align: center;
            background: #eef2f7;
            border-radius: 6px;
            margin-bottom: 10px;
            color: var(--primary-color);
            font-size: 14px;
        }
    </style>
</head>
<body>

    <h1>タスクプロンプト整形ツール (GitHub Pages 対応版)</h1>
    
    <div class="layout-grid">
        <div class="layout-col" style="width: 50%;">
            <div class="card">
                <h2>CSVルールのインポート / エクスポート</h2>
                <div class="drop-zone" id="dropZone">
                    ここに mask_rules.csv をドラッグ＆ドロップするか、
                    <input type="file" id="fileInput" accept=".csv" style="margin-top:5px;">
                </div>
                <button class="btn btn-success" onclick="downloadCsv()">編集したルールをCSVでダウンロード</button>
            </div>

            <div class="card">
                <h2>1. マスキングルールの編集</h2>
                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th style="width: 45%;">置換前の文字（実名など）</th>
                                <th style="width: 45%;">置換後の文字（マスク）</th>
                                <th style="width: 10%;">削除</th>
                            </tr>
                        </thead>
                        <tbody id="rulesTableBody">
                            </tbody>
                    </table>
                </div>
                <button class="btn" onclick="addNewRow()">ルールの新規追加</button>
            </div>
            
            <div class="card">
                <h2>2. AIへの指示文 (プロンプトルール)</h2>
                <textarea id="promptTemplate">以下のテキストは、私のメモやメールの内容です。
内容を分析し、以下の形式でタスクを整理して出力してください。

# 1. 期限が近い重要タスク
# 2. 今週中に対応すべきタスク
# 3. チームメンバーへの展開・確認事項

【対象テキスト】
---</textarea>
            </div>
        </div>

        <div class="layout-col" style="width: 50%;">
            <div class="card">
                <h2>3. メールの本文などを貼り付け</h2>
                <textarea id="sourceText" style="height: 180px;" placeholder="ここに自分宛てに送ったメールの本文を貼り付けます。"></textarea>
            </div>

            <button class="btn btn-large" onclick="generatePrompt()">マスキングしてプロンプトを生成 ▼</button>

            <div class="card">
                <h2>4. 整形されたプロンプト（クリックで全選択）</h2>
                <textarea id="resultText" class="result-box" readonly onclick="this.select();" placeholder="変換結果がここに出力されます。"></textarea>
                <p class="hint">※個人情報が正しく隠されているか必ず目視確認してください。</p>
            </div>
        </div>
    </div>

    <script>
        // デフォルトのマスター設定（CSV未読込時の初期値）
        let maskRules = [
            { before: "山田太郎", after: "[社員A]" },
            { before: "佐藤花子", after: "[社員B]" },
            { before: "鈴木一郎", after: "[社員C]" },
            { before: "株式会社A", after: "[取引先X]" }
        ];

        window.addEventListener('DOMContentLoaded', () => {
            renderRulesTable();
            setupDragAndDrop();
        });

        function renderRulesTable() {
            const tbody = document.getElementById('rulesTableBody');
            tbody.innerHTML = '';
            maskRules.forEach((rule, index) => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td><input type="text" class="input-inline" value="${escapeHtml(rule.before)}" onchange="updateRule(${index}, 'before', this.value)"></td>
                    <td><input type="text" class="input-inline" value="${escapeHtml(rule.after)}" onchange="updateRule(${index}, 'after', this.value)"></td>
                    <td><button class="btn btn-danger" onclick="deleteRule(${index})">削除</button></td>
                `;
                tbody.appendChild(tr);
            });
        }

        function updateRule(index, key, value) {
            maskRules[index][key] = value.trim();
        }

        function deleteRule(index) {
            maskRules.splice(index, 1);
            renderRulesTable();
        }

        function addNewRow() {
            let nextSuggest = "[社員D]";
            const employeeRules = maskRules.filter(r => r.after.includes("社員"));
            if (employeeRules.length > 0) {
                const lastRule = employeeRules[employeeRules.length - 1].after;
                const match = lastRule.match(/社員([A-Z0-9亜-熙ぁ-んァ-ヶ])/);
                const charCode = lastRule.charCodeAt(lastRule.indexOf("社員") + 2);
                if (charCode >= 65 && charCode < 90) {
                    nextSuggest = `[社員${String.fromCharCode(charCode + 1)}]`;
                } else {
                    nextSuggest = `[社員${employeeRules.length + 1}]`;
                }
            }
            maskRules.push({ before: "", after: nextSuggest });
            renderRulesTable();
            const inputs = document.querySelectorAll('#rulesTableBody tr:last-child input');
            if(inputs.length > 0) inputs[0].focus();
        }

        // ファイル選択・ドラッグ&ドロップの処理
        function setupDragAndDrop() {
            const fileInput = document.getElementById('fileInput');
            fileInput.addEventListener('change', (e) => {
                if (e.target.files.length > 0) handleFile(e.target.files[0]);
            });

            const dropZone = document.getElementById('dropZone');
            dropZone.addEventListener('dragover', (e) => { e.preventDefault(); });
            dropZone.addEventListener('drop', (e) => {
                e.preventDefault();
                if (e.dataTransfer.files.length > 0) handleFile(e.dataTransfer.files[0]);
            });
        }

        function handleFile(file) {
            const reader = new FileReader();
            reader.onload = (e) => {
                const text = e.target.result;
                parseCsv(text);
                renderRulesTable();
            };
            reader.readAsText(file);
        }

        function parseCsv(text) {
            const lines = text.split('\n');
            const importedRules = [];
            lines.forEach(line => {
                if (!line.trim()) return;
                const parts = line.split(',');
                if (parts.length >= 2) {
                    importedRules.push({ before: parts[0].trim(), after: parts[1].trim() });
                }
            });
            if(importedRules.length > 0) maskRules = importedRules;
        }

        // CSVのダウンロード機能
        function downloadCsv() {
            const csvContent = maskRules
                .filter(r => r.before !== "")
                .map(r => `${r.before},${r.after}`)
                .join('\n');
            
            const bom = new Uint8Array([0xEF, 0xBB, 0xBF]); // Excel文字化け防止用BOM
            const blob = new Blob([bom, csvContent], { type: 'text/csv;charset=utf-8;' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'mask_rules.csv';
            a.click();
            URL.revokeObjectURL(url);
        }

        function generatePrompt() {
            const template = document.getElementById('promptTemplate').value;
            let sourceText = document.getElementById('sourceText').value;
            const sortedRules = [...maskRules].sort((a, b) => b.before.length - a.before.length);
            
            sortedRules.forEach(rule => {
                if (!rule.before) return;
                const escapedBefore = rule.before.replace(/[-\/\\^$*+?.()|[\]{}]/g, '\\$&');
                const regex = new RegExp(escapedBefore, 'gi');
                sourceText = sourceText.replace(regex, rule.after);
            });

            const finalPrompt = template + "\n" + sourceText + "\n---";
            document.getElementById('resultText').value = finalPrompt;
        }

        function escapeHtml(str) {
            return str.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#039;");
        }
    </script>
</body>
</html>
