<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>レシート家計簿 - キーワード自動判別OCR版</title>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>
    <style>
        body { font-family: sans-serif; margin: 20px; background-color: #f0f2f5; color: #333; }
        .container { max-width: 650px; margin: 0 auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        h1, h2 { text-align: center; color: #1a1a1a; margin-bottom: 20px; }
        h2 { font-size: 1.2em; border-left: 4px solid #4dabf7; padding-left: 8px; text-align: left; margin-top: 30px; }
        
        .filter-section { background: #e7f5ff; padding: 15px; border-radius: 8px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }
        .month-select { padding: 6px 12px; font-size: 1em; border-radius: 4px; border: 1px solid #74c0fc; }

        /* ダッシュボード */
        .dashboard { background: #f8f9fa; border-radius: 8px; padding: 15px; margin-bottom: 15px; border: 1px solid #e9ecef; }
        .dashboard-title { font-weight: bold; margin-bottom: 10px; font-size: 0.95em; color: #495057; }
        .chart-row { display: flex; align-items: center; font-size: 0.85em; margin-bottom: 5px; }
        .chart-label { width: 140px; }
        .chart-bar-bg { flex-grow: 1; background: #e9ecef; height: 12px; border-radius: 6px; margin: 0 10px; overflow: hidden; }
        .chart-bar { height: 100%; background: #4dabf7; width: 0%; transition: width 0.3s; }
        .chart-bar.cashless { background: #fcc419; }
        .chart-value { width: 120px; text-align: right; }

        /* OCR撮影エリア */
        .upload-section { border: 2px dashed #4dabf7; padding: 20px; text-align: center; background: #f1f3f5; cursor: pointer; border-radius: 8px; margin-bottom: 20px; }
        #preview { max-width: 100%; max-height: 200px; display: none; margin: 10px auto 0; border-radius: 4px; }
        .loading { display: none; color: #4dabf7; font-weight: bold; text-align: center; margin: 10px 0; white-space: pre-line; }

        /* テーブル */
        .table-container { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 0.85em; }
        th, td { border-bottom: 1px solid #dee2e6; padding: 10px 4px; text-align: left; }
        th { background-color: #f1f3f5; }
        .input-edit, .select-edit { width: 100%; padding: 4px; box-sizing: border-box; border: 1px solid #ced4da; border-radius: 4px; }
        .btn-delete { background-color: #ffc9c9; color: #fa5252; border: none; padding: 4px 8px; border-radius: 4px; cursor: pointer; }

        /* データ管理ボタン */
        .backup-section { margin-top: 30px; padding-top: 15px; border-top: 1px dashed #ccc; display: flex; gap: 10px; justify-content: center; }
        .btn-secondary { background: #6c757d; color: white; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-size: 0.85em; }
    </style>
</head>
<body>

<div class="container">
    <h1>レシート家計簿 (自動判別OCR版)</h1>

    <div class="filter-section">
        <label for="month-filter">📅 対象月を選択:</label>
        <select id="month-filter" class="month-select"></select>
    </div>
    
    <div class="dashboard">
        <div class="dashboard-title">💳 支払いタイプ別（引き落とし額の把握用）</div>
        <div id="payment-type-charts"></div>
    </div>

    <div class="upload-section" onclick="document.getElementById('receipt-input').click()">
        <p id="upload-text">📸 タップしてレシート全体を撮影</p>
        <input type="file" id="receipt-input" accept="image/*" capture="environment" style="display: none;">
        <img id="preview" alt="レシートプレビュー">
    </div>

    <div id="loading-text" class="loading">画像を解析中...<br>(初回のみ日本語データのダウンロードに10秒ほどかかります)</div>

    <h2>明細一覧</h2>
    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th style="width: 22%;">日付</th>
                    <th style="width: 20%;">分類</th>
                    <th style="width: 23%;">支払い方法</th>
                    <th style="width: 20%;">金額 (円)</th>
                    <th style="width: 15%;">操作</th>
                </tr>
            </thead>
            <tbody id="history-rows"></tbody>
        </table>
    </div>

    <div class="backup-section">
        <button class="btn-secondary" onclick="exportJSON()">データをファイルに保存(JSON)</button>
        <button class="btn-secondary" onclick="document.getElementById('import-input').click()">データを復元</button>
        <input type="file" id="import-input" accept=".json" style="display: none;" onchange="importJSON(this)">
    </div>
</div>

<script>
    const CATEGORIES = ["食費", "ガソリン代", "日用品", "嗜好品", "その他"];
    const PAYMENTS = ["現金", "クレジットカード", "楽天ペイ", "その他"];

    let state = JSON.parse(localStorage.getItem('receipt_kakeibo_ocr_data')) || { items: [] };
    let currentSelectedMonth = new Date().toISOString().substring(0, 7); 

    const receiptInput = document.getElementById('receipt-input');
    const preview = document.getElementById('preview');
    const loadingText = document.getElementById('loading-text');
    const historyRows = document.getElementById('history-rows');
    const monthFilter = document.getElementById('month-filter');
    const paymentTypeCharts = document.getElementById('payment-type-charts');

    function saveState() {
        localStorage.setItem('receipt_kakeibo_ocr_data', JSON.stringify(state));
    }

    function updateMonthFilterOptions() {
        const months = state.items.map(item => item.date.substring(0, 7));
        months.push(new Date().toISOString().substring(0, 7));
        const uniqueMonths = [...new Set(months)].sort((a, b) => b.localeCompare(a));
        
        monthFilter.innerHTML = '';
        uniqueMonths.forEach(m => {
            const option = document.createElement('option');
            option.value = m;
            option.textContent = `${m.split('-')[0]}年${m.split('-')[1]}月`;
            if (m === currentSelectedMonth) option.selected = true;
            monthFilter.appendChild(option);
        });
    }

    monthFilter.addEventListener('change', (e) => { currentSelectedMonth = e.target.value; render(); });

    // 🌟 OCR読み取りと自動キーワード判定ロジック
    receiptInput.addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = function(event) {
            preview.src = event.target.result;
            preview.style.display = 'block';
        };
        reader.readAsDataURL(file);

        loadingText.style.display = 'block';

        // 日本語（jpn）と英語（eng）の混合モードで解析
        Tesseract.recognize(file, 'jpn+eng').then(({ data: { text } }) => {
            loadingText.style.display = 'none';
            
            console.log("--- OCR 読み取り生テキスト ---");
            console.log(text);
            
            // 1. 金額の抽出ロジック
            // 「合計」「お買上」「売上」「支払」などの文字の後に続く数字・記号の並びを探す
            const amountRegex = /(?:合計|お買|買上|売上|支払|合計金額|小計)[\s:：¥￥]*([0-9,.\s]+)/i;
            const matchAmount = text.replace(/\s+/g, '').match(/(?:合計|お買上計|買上計|売上|支払|小計)[^0-9]*([0-9,]+)/);
            
            let finalAmount = 0;
            if (matchAmount && matchAmount[1]) {
                let cleanedAmt = matchAmount[1].replace(/[^0-9]/g, '');
                finalAmount = parseInt(cleanedAmt, 10) || 0;
            }

            // 2. 支払い方法の抽出ロジック
            let finalPayment = "現金"; // デフォルト
            const lowerText = text.toLowerCase();
            if (lowerText.includes("クレジット") || lowerText.includes("カード") || lowerText.includes("master") || lowerText.includes("visa")) {
                finalPayment = "クレジットカード";
            } else if (lowerText.includes("楽天ペイ") || lowerText.includes("ペイ") || lowerText.includes("pay")) {
                finalPayment = "楽天ペイ";
            }

            // 3. 店名などからカテゴリをゆるく推測
            let finalCategory = "その他";
            if (lowerText.includes("ベルク") || lowerText.includes("belc") || lowerText.includes("スーパー")) {
                finalCategory = "食費";
            } else if (lowerText.includes("キグナス") || lowerText.includes("ガソリン") || lowerText.includes("kygnus")) {
                finalCategory = "ガソリン代";
            }

            // 新しい明細を追加
            const today = new Date().toISOString().split('T')[0];
            const newItem = {
                id: Date.now(),
                date: today,
                category: finalCategory,
                payment: finalPayment,
                amount: finalAmount
            };
            state.items.push(newItem);
            currentSelectedMonth = today.substring(0, 7);
            saveState();
            render();
        }).catch(err => {
            console.error(err);
            loadingText.textContent = "読み取り失敗。手動で入力・修正してください。";
        });
    });

    // レンダリングと集計ロジック
    function render() {
        updateMonthFilterOptions();
        historyRows.innerHTML = '';

        let cashTotal = 0;      
        let cashlessTotal = 0;  

        const filteredItems = state.items.filter(item => item.date.startsWith(currentSelectedMonth));
        filteredItems.sort((a, b) => b.date.localeCompare(a.date));

        filteredItems.forEach((item) => {
            if (item.payment === "現金") {
                cashTotal += item.amount;
            } else {
                cashlessTotal += item.amount;
            }

            const tr = document.createElement('tr');
            let catSelect = `<select class="select-edit" onchange="updateCategory(${item.id}, this.value)">`;
            CATEGORIES.forEach(cat => catSelect += `<option value="${cat}" ${cat === item.category ? 'selected' : ''}>${cat}</option>`);
            catSelect += `</select>`;

            let paySelect = `<select class="select-edit" onchange="updatePayment(${item.id}, this.value)">`;
            PAYMENTS.forEach(p => paySelect += `<option value="${p}" ${p === item.payment ? 'selected' : ''}>${p}</option>`);
            paySelect += `</select>`;

            tr.innerHTML = `
                <td><input type="date" class="input-edit" value="${item.date}" onchange="updateDate(${item.id}, this.value)"></td>
                <td>${catSelect}</td>
                <td>${paySelect}</td>
                <td><input type="number" class="input-edit" value="${item.amount}" onchange="updateAmount(${item.id}, this.value)"></td>
                <td><button class="btn-delete" onclick="deleteItem(${item.id})">削除</button></td>
            `;
            historyRows.appendChild(tr);
        });

        const grandTotal = cashTotal + cashlessTotal;
        const cashPercent = grandTotal > 0 ? Math.round((cashTotal / grandTotal) * 100) : 0;
        const cashlessPercent = grandTotal > 0 ? Math.round((cashlessTotal / grandTotal) * 100) : 0;

        paymentTypeCharts.innerHTML = `
            <div class="chart-row">
                <div class="chart-label">💵 現金合計</div>
                <div class="chart-bar-bg"><div class="chart-bar" style="width: ${cashPercent}%;"></div></div>
                <div class="chart-value">${cashTotal.toLocaleString()}円 (${cashPercent}%)</div>
            </div>
            <div class="chart-row">
                <div class="chart-label">💳 カード・Pay引き落とし</div>
                <div class="chart-bar-bg"><div class="chart-bar cashless" style="width: ${cashlessPercent}%;"></div></div>
                <div class="chart-value"><b>${cashlessTotal.toLocaleString()}円</b> (${cashlessPercent}%)</div>
            </div>
            <div style="text-align:right; font-weight:bold; margin-top:10px; font-size:1.1em;">月間総合計: ${grandTotal.toLocaleString()} 円</div>
        `;
    }

    // データ変更関数
    function updateAmount(id, val) { const item = state.items.find(i => i.id === id); if(item){ item.amount = Number(val)||0; saveState(); render(); }}
    function updateCategory(id, val) { const item = state.items.find(i => i.id === id); if(item){ item.category = val; saveState(); render(); }}
    function updatePayment(id, val) { const item = state.items.find(i => i.id === id); if(item){ item.payment = val; saveState(); render(); }}
    function updateDate(id, val) { const item = state.items.find(i => i.id === id); if(item){ item.date = val; currentSelectedMonth = val.substring(0,7); saveState(); render(); }}
    function deleteItem(id) { state.items = state.items.filter(i => i.id !== id); saveState(); render(); }

    function exportJSON() {
        const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(state, null, 2));
        const downloadAnchor = document.createElement('a');
        downloadAnchor.setAttribute("href", dataStr);
        downloadAnchor.setAttribute("download", `kakeibo_backup_${currentSelectedMonth}.json`);
        document.body.appendChild(downloadAnchor);
        downloadAnchor.click();
        downloadAnchor.remove();
    }

    function importJSON(input) {
        const file = input.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = function(e) {
            try {
                const imported = JSON.parse(e.target.result);
                if (imported && imported.items) { state = imported; saveState(); render(); alert("データを復元しました！"); }
            } catch (err) { alert("ファイルの読み込みに失敗しました。"); }
        };
        reader.readAsText(file);
    }

    render();
</script>
</body>
</html>
