<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QCストーリー伴走型作成ツール (A3版イメージ)</title>
    <style>
        :root {
            --primary-color: #005bac;
            --success-color: #28a745;
            --bg-color: #f4f6f9;
            --card-bg: #ffffff;
            --text-color: #333333;
            --border-color: #cccccc;
        }

        body {
            font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", Meiryo, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: var(--card-bg);
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        header {
            border-bottom: 2px solid var(--primary-color);
            padding-bottom: 10px;
            margin-bottom: 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        h1 {
            margin: 0;
            color: var(--primary-color);
            font-size: 24px;
        }

        .save-status {
            font-size: 14px;
            color: var(--success-color);
            font-weight: bold;
        }

        /* ブレッドクラム / プログレスバー */
        .breadcrumb-container {
            display: flex;
            background: #e9ecef;
            border-radius: 4px;
            padding: 0;
            list-style: none;
            margin-bottom: 30px;
            overflow: hidden;
        }

        .breadcrumb-item {
            flex: 1;
            text-align: center;
            padding: 12px 10px;
            position: relative;
            color: #666;
            font-weight: bold;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .breadcrumb-item::after {
            content: "";
            position: absolute;
            right: -15px;
            top: 0;
            width: 0;
            height: 0;
            border-top: 22px solid transparent;
            border-bottom: 22px solid transparent;
            border-left: 15px solid #e9ecef;
            z-index: 2;
        }

        .breadcrumb-item.active {
            background-color: var(--primary-color);
            color: white;
        }

        .breadcrumb-item.active::after {
            border-left-color: var(--primary-color);
        }

        .breadcrumb-item.completed {
            background-color: #d4edda;
            color: #155724;
        }

        .breadcrumb-item.completed::after {
            border-left-color: #d4edda;
        }

        /* ステップコンテンツ */
        .step-content {
            display: none;
        }

        .step-content.active {
            display: block;
        }

        /* アコーディオン（折りたたみ入力欄） */
        .accordion-section {
            border: 1px solid var(--border-color);
            border-radius: 6px;
            margin-bottom: 15px;
            overflow: hidden;
        }

        .accordion-header {
            background: #f8f9fa;
            padding: 15px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            user-select: none;
        }

        .accordion-header:hover {
            background: #e2e6ea;
        }

        .accordion-body {
            padding: 20px;
            border-top: 1px solid var(--border-color);
            background: #fff;
        }

        /* フォーム要素 */
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
        }

        textarea, select, input {
            width: 100%;
            padding: 10px;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            box-sizing: border-box;
            margin-bottom: 15px;
            font-size: 14px;
        }

        /* ヒントエリア（ツール側のロジックで出す部分） */
        .hint-box {
            background-color: #fff3cd;
            border-left: 5px solid #ffc107;
            color: #856404;
            padding: 15px;
            margin-bottom: 20px;
            border-radius: 4px;
        }

        .hint-title {
            font-weight: bold;
            margin-bottom: 5px;
        }

        /* モック図形の表現用 */
        .mock-chart {
            background: #e9ecef;
            border: 2px dashed #adb5bd;
            height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #495057;
            font-weight: bold;
            margin-top: 10px;
            border-radius: 4px;
        }

        /* ボタン関係 */
        .btn-container {
            display: flex;
            justify-content: space-between;
            margin-top: 30px;
        }

        .btn {
            padding: 12px 25px;
            font-size: 16px;
            font-weight: bold;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn-prev { background: #6c757d; color: white; }
        .btn-prev:hover { background: #5a6268; }
        .btn-next { background: var(--primary-color); color: white; }
        .btn-next:hover { background: #004b8d; }
        .btn-ai { background: #6f42c1; color: white; }
        .btn-ai:hover { background: #59359a; }

        /* AI出力結果プレビュー */
        .ai-result-box {
            background: #f3f0ff;
            border: 1px solid #d6bbfb;
            padding: 15px;
            border-radius: 4px;
            margin-top: 15px;
            white-space: pre-wrap;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>QCストーリー伴走作成ツール (A3版向け)</h1>
        <div class="save-status" id="saveStatus">○ 自動保存済み</div>
    </header>

    <ol class="breadcrumb-container" id="breadcrumb"></ol>

    <div id="stepContainer">
        </div>

    <div class="btn-container">
        <button class="btn btn-prev" id="prevBtn" onclick="moveStep(-1)">← 前のステップへ</button>
        <button class="btn btn-ai" id="aiBtn" onclick="generateAIQuery()">AI用プロンプトの生成</button>
        <button class="btn btn-next" id="nextBtn" onclick="moveStep(1)">次のステップへ →</button>
    </div>
</div>

<script>
    // QCのステップデータ定義
    const qcSteps = [
        { id: 0, title: "1. テーマ選定" },
        { id: 1, title: "2. 現状把握" },
        { id: 2, title: "3. 目標設定" },
        { id: 3, title: "4. 要因解析" },
        { id: 4, title: "5. 対策立案・実施" },
        { id: 5, title: "6. 効果確認" },
        { id: 6, title: "7. 歯止め・標準化" }
    ];

    let currentStep = 0;

    // 初期化処理
    function init() {
        renderBreadcrumb();
        renderSteps();
        showStep(currentStep);
    }

    // ブレッドクラムのレンダリング
    function renderBreadcrumb() {
        const bc = document.getElementById('breadcrumb');
        bc.innerHTML = qcSteps.map((step, index) => `
            <li class="breadcrumb-item ${index === currentStep ? 'active' : ''}" onclick="goToStep(${index})">
                ${step.title}
            </li>
        `).join('');
    }

    // 各ステップの入力フォームを生成 (今回はサンプルとしてステップ2「現状把握」を厚めに)
    function renderSteps() {
        const container = document.getElementById('stepContainer');
        
        container.innerHTML = qcSteps.map((step) => {
            if(step.id === 1) { // 現状把握ステップの場合の特別フォーム
                return `
                    <div class="step-content" id="stepContent-${step.id}">
                        <h2>${step.title} の入力</h2>
                        <p>現場で調べてきたデータを入力してください。ツールが最適なQC手法をアドバイスします。</p>
                        
                        <div class="accordion-section">
                            <div class="accordion-header" onclick="toggleAccordion(this)">
                                <span>▼ 【入力欄】調査データの入力（人間が考えるパート）</span>
                            </div>
                            <div class="accordion-body">
                                <label>1. どのような種類のデータを集めましたか？（手法選定ロジック用）</label>
                                <select id="dataTypeSelect" onchange="analyzeDataMethod()">
                                    <option value="">-- 選択してください --</option>
                                    <option value="dislike">不適合品の種類や発生件数、金額などのデータ</option>
                                    <option value="time">時間経過による数値の変化（月別、日別の推移など）</option>
                                    <option value="relation">2つの因果関係（例：温度と強度の関係など）</option>
                                </select>

                                <label>2. 調査してきた生データや内容をメモしてください</label>
                                <textarea id="rawMethodData" rows="4" placeholder="例：キズが30件、汚れが50件、変形が10件..."></textarea>
                            </div>
                        </div>

                        <div id="methodHintArea" style="display:none;">
                            <div class="hint-box">
                                <div class="hint-title" id="hintTitle">💡 ツールからの選定アドバイス</div>
                                <div id="hintBody"></div>
                            </div>
                        </div>

                        <div id="aiOutputArea" style="display:none;">
                            <h3>📊 AIによる清書・まとめ結果 (A3反映用)</h3>
                            <div class="ai-result-box" id="aiResultText"></div>
                        </div>
                    </div>
                `;
            } else {
                // その他のステップの汎用的な形
                return `
                    <div class="step-content" id="stepContent-${step.id}">
                        <h2>${step.title} の入力</h2>
                        <div class="accordion-section">
                            <div class="accordion-header" onclick="toggleAccordion(this)">
                                <span>▼ 【入力欄】このステップで調査・決定したこと</span>
                            </div>
                            <div class="accordion-body">
                                <label>現場での検討内容を入力してください：</label>
                                <textarea rows="6" placeholder="${step.title}に関する内容を箇条書きなどで入力..."></textarea>
                            </div>
                        </div>
                        <div class="hint-box">
                            <div class="hint-title">💡 このステップのヒント</div>
                            <p>A3資料としてまとめる際は、背景、現在の困りごと、そして目指す姿が一本のストーリーで繋がっているかを確認しましょう。</p>
                        </div>
                    </div>
                `;
            }
        }).join('');
    }

    // ステップ切り替え表示
    function showStep(stepId) {
        document.querySelectorAll('.step-content').forEach(el => el.classList.remove('active'));
        document.getElementById(`stepContent-${stepId}`).classList.add('active');
        
        // ボタンの制御
        document.getElementById('prevBtn').style.visibility = stepId === 0 ? 'hidden' : 'visible';
        document.getElementById('nextBtn').innerText = stepId === qcSteps.length - 1 ? '完成資料プレビュー' : '次のステップへ →';
        
        currentStep = stepId;
        renderBreadcrumb();
    }

    function moveStep(direction) {
        let next = currentStep + direction;
        if(next >= 0 && next < qcSteps.length) {
            showStep(next);
            triggerAutoSave();
        }
    }

    function goToStep(stepId) {
        showStep(stepId);
    }

    // アコーディオンの開閉
    function toggleAccordion(header) {
        const body = header.nextElementSibling;
        body.style.display = (body.style.display === 'none' || body.style.display === '') ? 'block' : 'none';
    }

    // 【重要】ツール側での統計的手法の選定ロジック
    function analyzeDataMethod() {
        const selectValue = document.getElementById('dataTypeSelect').value;
        const hintArea = document.getElementById('methodHintArea');
        const hintBody = document.getElementById('hintBody');

        if (!selectValue) {
            hintArea.style.display = 'none';
            return;
        }

        hintArea.style.display = 'block';

        // 選択されたデータタイプに応じて、ツール側でロジック選定してヒントを返す
        if (selectValue === 'dislike') {
            hintBody.innerHTML = `
                <p><strong>選定された手法： パレート図</strong></p>
                <p>現在の入力では「現象の種類」と「件数」の情報が必要です。これらが揃っていればパレート図を作成できます。</p>
                <p><strong>作成のヒント：</strong> 項目を件数の多い順に並び替え、累積の割合を折れ線で重ねます。どこを重点的に対策すべきか（上位2〜3項目で全体の8割を占めるか）を確認しましょう。</p>
                <div class="mock-chart">[パレート図のイメージ：棒グラフが降順に並び、累積％の折れ線がある状態]</div>
            `;
        } else if (selectValue === 'time') {
            hintBody.innerHTML = `
                <p><strong>選定された手法： 折れ線グラフ（管理図）</strong></p>
                <p><strong>作成のヒント：</strong> 横軸に時間（日付や月）、縦軸に数値を取ります。異常な飛び値がないか、全体として減少・増加の傾向があるかを読み取ります。</p>
                <div class="mock-chart">[折れ線グラフのイメージ：時系列の推移]</div>
            `;
        } else if (selectValue === 'relation') {
            hintBody.innerHTML = `
                <p><strong>選定された手法： 散布図</strong></p>
                <p><strong>作成のヒント：</strong> 2つの要素を縦軸と横軸にプロットします。右肩上がりなら正の相関、右肩下がりなら負の相関があると判断できます。</p>
                <div class="mock-chart">[散布図のイメージ：点が斜めに集まっている状態]</div>
            `;
        }
    }

    // AIへのプロンプト成形ロジック（ボタンを押したときの処理）
    function generateAIQuery() {
        // 例として「現状把握」ステップのデータを取得
        const dataType = document.getElementById('dataTypeSelect') ? document.getElementById('dataTypeSelect').value : '';
        const rawData = document.getElementById('rawMethodData') ? document.getElementById('rawMethodData').value : '';

        if(currentStep === 1 && rawData === "") {
            alert("現場の調査データを入力してからプロンプトを生成してください。");
            return;
        }

        // ツール側で枠組みをガチガチに固めたプロンプト（成形ロジック）
        const prompt = `
【QCストーリー A3資料用成形プロンプト】
あなたはQCサークル大会の審査員です。以下の現場の泥臭いデータを、A3版横型資料の「2. 現状把握」の枠にぴったり収まるよう、簡潔かつ論理的に要約・成形してください。

■現場の生データ:
"${rawData}"

■制約条件:
・文字数は150文字程度。
・箇条書きを使用し、客観的な事実（数値）が目立つようにする。
・専門用語は使わず、誰が見てもわかる表現にする。
        `;

        // 実際はここでAPIにリクエストを投げますが、今回は疑似的にAIが返してきた風の処理をシミュレート
        alert("ツール内でプロンプトを成形しました！\n\n【生成されたプロンプト】\n" + prompt + "\n\n※OKを押すと、AIから整形されたテキストがツールに戻ってくる様子をシミュレートします。");

        // AIから返ってきた結果をツール側のUIに反映
        setTimeout(() => {
            const aiArea = document.getElementById('aiOutputArea');
            const aiText = document.getElementById('aiResultText');
            if(aiArea && aiText) {
                aiArea.style.display = 'block';
                aiText.innerText = "・調査の結果、不適合全体の〇〇%を「汚れ」と「キズ」が占めていることが判明した。\n・特に「汚れ」は前月比〇倍に急増しており、最重点課題として取り組む必要がある。";
            }
        }, 500);
    }

    // 模擬の自動保存機能
    function triggerAutoSave() {
        const status = document.getElementById('saveStatus');
        status.innerText = "● 保存中...";
        setTimeout(() => {
            status.innerText = "○ 自動保存済み";
        }, 800);
    }

    // スタート
    window.onload = init;
</script>
</body>
</html>
